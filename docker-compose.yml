version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Make sure to add your MongoDB URI here or in a .env file
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
